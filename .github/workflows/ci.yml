name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Tests and Static Checks
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python package
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev,documents,scheduler,system_control]"

      - name: Compile Python sources
        shell: pwsh
        run: python -m compileall app tests -q

      - name: Check browser JavaScript syntax
        shell: pwsh
        run: |
          node --check app\static\app.js
          node --check app\static\js\workbench.js
          node --check app\static\js\dashboard-renderer.js
          node --check app\static\js\dashboard-events.js

      - name: Run pytest
        shell: pwsh
        env:
          KERN_PRODUCT_POSTURE: personal
        run: python -m pytest -q

  package:
    name: Command-Line Package Gate
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install packaging dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev,documents,scheduler,system_control]"

      - name: Build runtime package
        shell: pwsh
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\scripts\package-kern-runtime.ps1

      - name: Validate latest runtime package
        shell: pwsh
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\scripts\validate-kern-package.ps1

      - name: Validate publish hygiene
        shell: pwsh
        run: python .\scripts\validate-publish-hygiene.py --json
