name: Bug Report
description: Report a reproducible KERN defect.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: What broke, and what work did it block?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: Use exact commands, files, and UI actions where possible.
      placeholder: |
        1. Run ...
        2. Upload ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Commit Or Version
      placeholder: "git commit, release tag, or package timestamp"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: "Windows version, Python version, install path, KERN_LLM_ENABLED value"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs Or Screenshots
      description: Remove secrets and private document contents before attaching logs.
